# ── unix/AppImageBuilder.yml ──────────────────────────────────────────────────
# appimage-builder recipe for ChordGen.
# Called by unix/build.sh --appimage from the Release build directory.
#
# Prerequisites:
#   pip3 install appimage-builder
#   sudo apt-get install patchelf
#
# Manual usage (from repo root, after Release build):
#   cd build/ChordGen_vX_YYZZZ_unix
#   appimage-builder --recipe ../../unix/AppImageBuilder.yml --skip-test
# ─────────────────────────────────────────────────────────────────────────────
version: 1

AppDir:
  path: ./AppDir

  app_info:
    id: de.chordgen.ChordGen
    name: ChordGen
    icon: chordgen          # place chordgen.png (256x256) in unix/ for branding
    version: !ENV ${APPVERSION:latest}
    exec: usr/bin/ChordGen
    exec_args: $@

  apt:
    arch: amd64
    sources:
      - sourceline: deb http://archive.ubuntu.com/ubuntu jammy main restricted universe
        key_url: https://keyserver.ubuntu.com/pks/lookup?op=get&search=0x871920D1991BC93C

    include:
      # Minimal Qt6 runtime – appimage-builder resolves transitive deps
      - libqt6core6
      - libqt6gui6
      - libqt6widgets6
      - libqt6dbus6
      - libqt6xcbqpa6
      - libxcb-icccm4
      - libxcb-image0
      - libxcb-keysyms1
      - libxcb-randr0
      - libxcb-render-util0
      - libxcb-shape0
      - libxcb-xinerama0
      - libxcb-xkb1
      - libxkbcommon-x11-0

    exclude:
      - humanity-icon-theme
      - hicolor-icon-theme

  files:
    include:
      - /usr/lib/x86_64-linux-gnu/qt6/plugins/platforms/libqxcb.so
      - /usr/lib/x86_64-linux-gnu/qt6/plugins/imageformats

  runtime:
    env:
      QT_QPA_PLATFORM_PLUGIN_PATH: '${APPDIR}/usr/lib/x86_64-linux-gnu/qt6/plugins/platforms'

AppImage:
  arch: x86_64
  update-information: guess
  sign-key: None
  file_name: ChordGen-${APPVERSION}-x86_64.AppImage
